name: Lean 4 Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Lean 4 via elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Cache lake-packages
      uses: actions/cache@v4
      with:
        path: |
          .lake/
          lake-packages/
        key: ${{ runner.os }}-lean-${{ hashFiles('lakefile.toml', 'lean-toolchain') }}

    - name: Fetch Mathlib
      run: lake update

    - name: Build project
      run: lake build
